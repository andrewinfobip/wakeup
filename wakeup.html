<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Jukebox</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f13;
      color: #e0e0e0;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .card {
      background: #1a1a2e;
      border-radius: 20px;
      padding: 36px 40px;
      width: 420px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 6px;
      color: #fff;
    }

    .subtitle {
      font-size: 0.85rem;
      color: #888;
      margin-bottom: 28px;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #aaa;
      margin-bottom: 6px;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    input[type="text"], input[type="number"] {
      width: 100%;
      padding: 11px 14px;
      background: #0f0f13;
      border: 1px solid #333;
      border-radius: 10px;
      color: #e0e0e0;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 18px;
    }

    input:focus { border-color: #6366f1; }

    .row {
      display: flex;
      gap: 12px;
    }

    .row > div { flex: 1; }

    .btn-start {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 4px;
    }

    .btn-start:hover { background: #4f46e5; }
    .btn-start:active { transform: scale(0.98); }
    .btn-start:disabled { background: #3a3a5c; color: #666; cursor: not-allowed; }

    .status-box {
      margin-top: 28px;
      background: #0f0f13;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      display: none;
    }

    .status-box.visible { display: block; }

    .countdown {
      font-size: 2.8rem;
      font-weight: 800;
      color: #6366f1;
      font-variant-numeric: tabular-nums;
      letter-spacing: -1px;
    }

    .countdown-label {
      font-size: 0.78rem;
      color: #666;
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .now-playing {
      margin-top: 16px;
      padding: 10px 14px;
      background: #1a2a1a;
      border: 1px solid #2a5a2a;
      border-radius: 8px;
      font-size: 0.85rem;
      color: #4ade80;
      display: none;
      align-items: center;
      gap: 8px;
    }

    .now-playing.visible { display: flex; }

    .pulse {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #4ade80;
      flex-shrink: 0;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(0.7); }
    }

    .btn-stop {
      margin-top: 14px;
      width: 100%;
      padding: 9px;
      background: transparent;
      color: #666;
      border: 1px solid #333;
      border-radius: 8px;
      font-size: 0.85rem;
      cursor: pointer;
      transition: color 0.2s, border-color 0.2s;
    }

    .btn-stop:hover { color: #e0e0e0; border-color: #666; }

    #sc-player {
      position: fixed;
      bottom: 12px;
      right: 12px;
      width: 200px;
      height: 60px;
      border-radius: 8px;
      overflow: hidden;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
      border: none;
    }

    #sc-player.visible { opacity: 1; pointer-events: auto; }

    .error {
      margin-top: 10px;
      font-size: 0.82rem;
      color: #f87171;
      display: none;
    }

    .error.visible { display: block; }
  </style>
</head>
<body>

<div class="card">
  <h1>🎵 YouTube Jukebox</h1>
  <p class="subtitle">Plays 10 seconds of a song every 5 minutes</p>

  <label for="url-input">YouTube URL</label>
  <input type="text" id="url-input" placeholder="https://soundcloud.com/..." value="https://soundcloud.com/codered549/your-new-morning-alarm-marc-rebillet" />

  <div class="row">
    <div>
      <label for="start-input">Start Time</label>
      <input type="text" id="start-input" placeholder="0:00 or seconds" value="0:25" />
    </div>
    <div>
      <label for="interval-input">Interval (min)</label>
      <input type="number" id="interval-input" value="5" min="1" max="60" />
    </div>
  </div>

  <button class="btn-start" id="btn-start">▶ Start Jukebox</button>
  <p class="error" id="error-msg"></p>

  <div class="status-box" id="status-box">
    <div class="countdown" id="countdown">5:00</div>
    <div class="countdown-label">until next play</div>
    <div class="now-playing" id="now-playing">
      <span class="pulse"></span>
      <span>Playing now...</span>
    </div>
    <button class="btn-stop" id="btn-stop">■ Stop Jukebox</button>
  </div>
</div>

<iframe id="sc-player" allow="autoplay" scrolling="no"></iframe>
<script src="https://w.soundcloud.com/player/api.js"></script>

<script>
  var widget = null;
  var widgetReady = false;
  var countdownTimer = null;
  var stopTimer = null;
  var nextPlayAt = null;

  function parseStartTime(val) {
    val = val.trim();
    if (/^\d+:\d{2}(:\d{2})?$/.test(val)) {
      var parts = val.split(':').map(Number);
      if (parts.length === 2) return parts[0] * 60 + parts[1];
      if (parts.length === 3) return parts[0] * 3600 + parts[1] * 60 + parts[2];
    }
    var n = parseFloat(val);
    return isNaN(n) ? 0 : n;
  }

  function showError(msg) {
    var el = document.getElementById('error-msg');
    el.textContent = msg;
    el.classList.add('visible');
  }

  function clearError() {
    document.getElementById('error-msg').classList.remove('visible');
  }

  function formatTime(ms) {
    var totalSec = Math.max(0, Math.ceil(ms / 1000));
    var min = Math.floor(totalSec / 60);
    var sec = totalSec % 60;
    return min + ':' + String(sec).padStart(2, '0');
  }

  function playClip(startMs) {
    if (!widget || !widgetReady) return;

    document.getElementById('sc-player').classList.add('visible');
    document.getElementById('now-playing').classList.add('visible');

    widget.seekTo(startMs);
    widget.play();

    clearTimeout(stopTimer);
    stopTimer = setTimeout(function () {
      widget.pause();
      document.getElementById('now-playing').classList.remove('visible');
      document.getElementById('sc-player').classList.remove('visible');
    }, 10000);
  }

  function startCountdown(intervalMs, startMs) {
    nextPlayAt = Date.now() + intervalMs;

    clearInterval(countdownTimer);
    countdownTimer = setInterval(function () {
      var remaining = nextPlayAt - Date.now();
      document.getElementById('countdown').textContent = formatTime(remaining);

      if (remaining <= 0) {
        nextPlayAt = Date.now() + intervalMs;
        playClip(startMs);
      }
    }, 500);
  }

  document.getElementById('btn-start').addEventListener('click', function () {
    clearError();

    var url = document.getElementById('url-input').value.trim();
    if (!url || !url.includes('soundcloud.com')) {
      showError('Please enter a valid SoundCloud URL.');
      return;
    }

    var startSeconds = parseStartTime(document.getElementById('start-input').value);
    var startMs = startSeconds * 1000;
    var intervalMin = parseFloat(document.getElementById('interval-input').value) || 5;
    var intervalMs = intervalMin * 60 * 1000;

    // Build embed src and bind the widget
    var iframe = document.getElementById('sc-player');
    iframe.src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url) +
      '&auto_play=false&buying=false&liking=false&download=false' +
      '&sharing=false&show_artwork=false&show_comments=false' +
      '&show_playcount=false&show_user=false&hide_related=true&visual=false';

    widgetReady = false;
    widget = SC.Widget(iframe);

    widget.bind(SC.Widget.Events.READY, function () {
      widgetReady = true;
      playClip(startMs);
      startCountdown(intervalMs, startMs);
    });

    document.getElementById('status-box').classList.add('visible');
    document.getElementById('btn-start').disabled = true;
  });

  document.getElementById('btn-stop').addEventListener('click', function () {
    clearInterval(countdownTimer);
    clearTimeout(stopTimer);
    if (widget && widgetReady) widget.pause();
    document.getElementById('now-playing').classList.remove('visible');
    document.getElementById('sc-player').classList.remove('visible');
    document.getElementById('status-box').classList.remove('visible');
    document.getElementById('btn-start').disabled = false;
  });
</script>
</body>
</html>
